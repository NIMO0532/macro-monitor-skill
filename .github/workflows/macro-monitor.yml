name: 每日宏观数据监控

on:
  # 每天 UTC 14:00 = 北京时间 22:00
  schedule:
    - cron: '0 14 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  macro-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行宏观数据采集
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          python macro_monitor.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: macro-report-${{ github.run_number }}
          path: macro-report-*.md
          retention-days: 30
